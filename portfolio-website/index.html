<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suleiman-Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <form action="/submit" method="POST">
            <fieldset>
                <legend>Get in Touch</legend>
        
                <label for="name">Name:
                    <input type="text" id="name" name="name" required></label><br><br>
        
        
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required></label><br><br>
        
                <label for="message">Message:</label><br>
                <textarea name="message" id="message" rows="4" required></textarea><br><br>
                <label for="subscribe">
                    <input type="checkbox" id="subscribe" name="subscribe" required>
                    Subscribe to newsletter</label>
        
                <button type="submit">Send</button>
            </fieldset>
        </form>
</body>
</html>
